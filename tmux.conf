# ============================================
# PREFIX
# ============================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================
# INDICI
# ============================================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ============================================
# KEYBINDINGS
# ============================================

# Ricarica config
bind r source-file ~/.tmux.conf \; display "Ricaricato!"

# Split — il nuovo pannelle eredita la directory corrente
bind-key | split-window -h -c "#{pane_current_path}"    # | = verticale (sinistra/destra)
bind-key - split-window -v -c "#{pane_current_path}"     # - = orizzontale (sopra/sotto)

# Navigazione tra pannelli con le frecce
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# Ridimensionamento pannelli con Shift+frecce
# -r permette di ripetere il tasto senza ripremere il prefix
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# Zoom su un singolo pannello (prefix + z per attivare/disattivare)
bind z resize-pane -Z

# ============================================
# GENERALE
# ============================================
set -g mouse on
set -g escape-time 10
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ============================================
# STATUS BAR
# ============================================
set -g window-status-style bg=colour238,fg=colour248
set -g window-status-current-style bg=red,fg=white
set -g status-left '%H:%M:%S '
set -g status-right '#(TZ="Europe/Rome" date +%%H:%%M:%%S)'
